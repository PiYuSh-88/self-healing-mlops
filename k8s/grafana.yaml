apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
          env:
            # Default Grafana login is admin/admin. This sets the admin password.
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "mlops_admin"
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
spec:
  type: LoadBalancer # Expose Grafana externally so the user can open it in a browser
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
